name: Performance Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL of the environment to test (e.g., https://example.com)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  gatling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Gatling simulation
        run: mvn -B -ntp -DBASE_URL="${{ inputs.base_url }}" gatling:test

      - name: Upload Gatling reports
        uses: actions/upload-artifact@v4
        with:
          name: gatling-reports
          path: target/gatling
