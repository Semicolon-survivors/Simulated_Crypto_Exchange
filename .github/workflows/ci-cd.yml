name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend - Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and run unit + integration tests
        run: mvn -B -ntp verify

      - name: Upload backend artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: |
            target/*.jar
          if-no-files-found: ignore

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  docker-build-push:
    name: Docker - Build & Push to GHCR
    needs: [ backend-tests, frontend-build ]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta - Backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-backend
          tags: |
            type=sha
            type=ref,event=branch,branch=main
            type=ref,event=tag

      - name: Meta - Frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=sha
            type=ref,event=branch,branch=main
            type=ref,event=tag

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-backend:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}-backend:cache,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-frontend:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}-frontend:cache,mode=max

      - name: Export image tags for downstream jobs
        id: images
        run: |
          BACKEND_TAG=$(echo "${{ steps.meta-backend.outputs.tags }}" | head -n1)
          FRONTEND_TAG=$(echo "${{ steps.meta-frontend.outputs.tags }}" | head -n1)
          echo "backend_image=${BACKEND_TAG}" >> $GITHUB_OUTPUT
          echo "frontend_image=${FRONTEND_TAG}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy with Docker Compose
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Compose files and config to remote
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          overwrite: true
          source: |
            docker-compose.yml
            docker-compose.deploy.yml
            observability/*
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy remotely
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND_IMAGE: ${{ needs.docker-build-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.docker-build-push.outputs.frontend_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            echo "Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "Pulling images..."
            BACKEND_IMAGE="${BACKEND_IMAGE:-ghcr.io/${GITHUB_REPOSITORY}-backend:latest}"
            FRONTEND_IMAGE="${FRONTEND_IMAGE:-ghcr.io/${GITHUB_REPOSITORY}-frontend:latest}"
            export BACKEND_IMAGE FRONTEND_IMAGE

            docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --remove-orphans

            echo "Pruning old images..."
            docker image prune -f
